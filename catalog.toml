name = "ynabx"
description = "Agent-composable marimo notebooks over the YNAB REST API, cached into DuckDB."

[data]
surface = "duckdb"      # analysis runs on a local DuckDB cache; nb02 delta-syncs it from the YNAB REST API
cache = "YNAB_DB_PATH"  # cache location (default ./data/ynab.db)

[auth]
env_var = "YNAB_TOKEN"  # YNAB Personal Access Token; or set YNAB_OP_REF to read it from 1Password via `op`

[getting_started]
first_notebook = "nb01_ynab_client.py"

[[vignette]]
notebook = "nb01_ynab_client.py"
helpers  = ["get_token", "get", "patch", "list_budgets", "active_budget_id"]
does     = "Auth (token via env or 1Password) + thin HTTP wrappers over api.ynab.com/v1 + budget discovery."

[[vignette]]
notebook = "nb02_ynab_sync.py"
helpers  = ["connect", "last_knowledge", "sync", "status", "reconcile"]
does     = "Open the DuckDB cache, ensure schema, delta-sync transactions via YNAB's server_knowledge cursor (idempotent). reconcile() does a full since_date pull to prune stale matched-import duplicates the delta feed leaves behind (guard-aborts on a short pull)."

[[vignette]]
notebook = "nb03_review.py"
helpers  = ["payee_top_categories", "suggest_category", "suggest_by_tokens", "pending"]
does     = "Pending-review table (uncategorized/unapproved/uncleared, transfers excluded) with payee-history category suggestions. suggest_by_tokens is a name-token fallback for NEW payees the exact-payee suggester can't see (noisy; suggest-then-confirm). Read-only."

[[vignette]]
notebook = "nb04_bulk_edit.py"
helpers  = ["propose_apply_suggestions", "apply_edits"]
does     = "Build a patch plan and apply via the YNAB bulk PATCH endpoint. Dry-run by default; re-syncs the cache after a real apply."

[[vignette]]
notebook = "nb05_export.py"
helpers  = ["export_transactions", "monthly_category_summary", "payee_totals"]
does     = "Parquet/CSV exports, month x category spend summaries, top payees by absolute spend."

[[vignette]]
notebook = "nb06_reconcile.py"
helpers  = ["load_statement", "reconcile"]
does     = "Diff a bank-statement CSV against a YNAB account via amount-pooled matching: charges missing from YNAB, YNAB rows not on the statement, cleared-vs-bank delta. Read-only. Balance matching uses parent_id IS NULL, not the spend filter."

[[vignette]]
notebook = "nb07_budget_assign.py"
helpers  = ["anticipate", "assign"]
does     = "Monthly budget-assignment planner. anticipate(month) proposes a per-category assignment (goaled -> goal_under_funded; else max of recency-weighted seasonal p75, a trailing-3mo regime guard, and the scheduled-bill floor, net of available; reimbursables deferred; lumpy categories flagged) and sweeps the remainder to the catch-all so Ready to Assign hits 0. assign(plan, month) tops up budgeted via PATCH months/{month}/categories; dry-run by default. Backtested by data/processed/backtest_anticipation.py."

[[vignette]]
notebook = "nb08_adp_paystubs.py"
helpers  = ["latest_adp_export", "load_adp", "export_adp_csv", "validate_adp", "income_history", "income_stability", "split_variation", "match_ynab_deposits"]
does     = "Validate and normalize private MyADP pay statements, measure recurring-income stability, rank paycheck-split drivers, and match deposits to local YNAB inflows."

[[vignette]]
notebook = "nb09_reimbursements.py"
helpers  = ["whole", "outstanding", "leaks"]
does     = "Reimbursable ledger read off the category balance, not flags/memos. whole() = the truth (balance; ~0 = settled) plus a flag-drift check (orange rows should net to the balance); outstanding() = chase list of open (orange-flagged) rows grouped by reimburser (the memo prefix before ':'); leaks() = reimbursement money booked OUTSIDE the category (wires/refunds in income/RTA) to re-categorize. Read-only; reconcile() (not sync) after bulk memo edits."
