[tool.ruff]
line-length = 120

[tool.ruff.lint.per-file-ignores]
# Marimo notebooks intentionally use bare expressions for rendering, cross-notebook
# imports ruff cannot see statically, and cell-private scratch values. Keep this
# centralized instead of scattering per-line noqa through the notebooks.
"notebooks/nb*.py" = ["B018", "F401", "F821", "F841"]
